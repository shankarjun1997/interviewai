services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: interviewai
      POSTGRES_PASSWORD: interviewai
      POSTGRES_DB: interviewai
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]

  redis:
    image: redis:7
    ports: ["6379:6379"]

  api:
    build: ../apps/api
    environment:
      DATABASE_URL: postgresql+asyncpg://interviewai:interviewai@db:5432/interviewai
      REDIS_URL: redis://redis:6379/0
    ports: ["8000:8000"]
    depends_on: [db, redis]

  web:
    build: ../apps/web
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports: ["3000:3000"]
    depends_on: [api]

volumes:
  pgdata:
